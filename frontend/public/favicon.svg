<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0c1322"/>

  <!-- Green field -->
  <rect x="2.5" y="6" width="27" height="20" rx="4" fill="#15803d"/>

  <!-- Field outer white border -->
  <rect x="4" y="7.5" width="24" height="17" rx="2.5" fill="none" stroke="rgba(255,255,255,0.80)" stroke-width="0.8"/>

  <!-- Halfway line -->
  <line x1="16" y1="7.5" x2="16" y2="24.5" stroke="rgba(255,255,255,0.80)" stroke-width="0.8"/>

  <!-- Center circle -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="rgba(255,255,255,0.80)" stroke-width="0.8"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1" fill="white" opacity="0.90"/>

  <!-- Left penalty area -->
  <rect x="4" y="11" width="6.5" height="10" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.7"/>

  <!-- Right penalty area -->
  <rect x="21.5" y="11" width="6.5" height="10" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0.7"/>

  <!-- Left goal -->
  <rect x="4" y="13.2" width="2.8" height="5.6" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="0.6"/>

  <!-- Right goal -->
  <rect x="25.2" y="13.2" width="2.8" height="5.6" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="0.6"/>
</svg>
