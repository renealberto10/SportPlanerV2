<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5b78f6"/>
      <stop offset="100%" stop-color="#3d5af1"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="7" ry="7"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#g)"/>

  <!-- Subtle top-left highlight -->
  <rect width="32" height="32" rx="7" ry="7" fill="white" opacity="0.08" clip-path="url(#clip)"/>

  <!-- "SP" text -->
  <text
    x="16" y="22"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="14"
    font-weight="900"
    fill="white"
    letter-spacing="-0.5"
  >SP</text>
</svg>
