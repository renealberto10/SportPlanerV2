# ── SportPlanner — Production ──────────────────────────────
# Usa el Traefik existente en el servidor (red: web, certresolver: letsencrypt)
#
# Requisitos previos en el servidor:
#   1. Red "web" ya existe (creada por traefik-portainer)
#   2. Copiar .env.prod.example → .env.prod y completar APP_KEY
#   3. DNS: sportplanner.app y www.sportplanner.app → IP del servidor
#
# Uso:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# ──────────────────────────────────────────────────────────

name: sportplanner-prod

networks:
  web:
    external: true          # Red del Traefik del servidor
  internal:
    driver: bridge          # Red privada frontend ↔ api

volumes:
  sqlite-data:              # Base de datos SQLite (persistente)
  api-storage:              # Storage de Laravel (persistente)

services:

  # ── Laravel API ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: sportplanner/api:latest
    container_name: sp-api
    restart: unless-stopped
    environment:
      APP_NAME: SportPlanner
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: https://sportplanner.app
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
      TRUSTED_PROXIES: "*"
    volumes:
      - sqlite-data:/var/www/html/database
      - api-storage:/var/www/html/storage
    networks:
      - internal
    labels:
      - "traefik.enable=false"

  # ── Vue Frontend (Nginx) ───────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    image: sportplanner/frontend:latest
    container_name: sp-frontend
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      # ── HTTPS: sportplanner.app ────────────────────────
      - "traefik.http.routers.sportplaner.rule=Host(`sportplanner.app`)"
      - "traefik.http.routers.sportplaner.entrypoints=websecure"
      - "traefik.http.routers.sportplaner.tls=true"
      - "traefik.http.routers.sportplaner.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sportplaner.middlewares=sp-security"
      - "traefik.http.services.sportplaner.loadbalancer.server.port=80"

      # ── HTTPS: www.sportplanner.app → redirect apex ───
      - "traefik.http.routers.sportplaner-www.rule=Host(`www.sportplanner.app`)"
      - "traefik.http.routers.sportplaner-www.entrypoints=websecure"
      - "traefik.http.routers.sportplaner-www.tls=true"
      - "traefik.http.routers.sportplaner-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sportplaner-www.middlewares=sp-www-redirect"

      # ── HTTP → HTTPS redirect ─────────────────────────
      - "traefik.http.routers.sportplaner-http.rule=Host(`sportplanner.app`) || Host(`www.sportplanner.app`)"
      - "traefik.http.routers.sportplaner-http.entrypoints=web"
      - "traefik.http.routers.sportplaner-http.middlewares=sp-https-redirect"

      # ── Middlewares ───────────────────────────────────
      - "traefik.http.middlewares.sp-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sp-https-redirect.redirectscheme.permanent=true"

      - "traefik.http.middlewares.sp-www-redirect.redirectregex.regex=^https://www\\.sportplanner\\.app/(.*)"
      - "traefik.http.middlewares.sp-www-redirect.redirectregex.replacement=https://sportplanner.app/$${1}"
      - "traefik.http.middlewares.sp-www-redirect.redirectregex.permanent=true"

      - "traefik.http.middlewares.sp-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.sp-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.sp-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.sp-security.headers.frameDeny=true"
      - "traefik.http.middlewares.sp-security.headers.contentTypeNosniff=true"
