# ── SportPlaner — Production ──────────────────────────────
# Requisitos previos:
#   1. docker network create traefik-public
#   2. Copiar .env.prod.example → .env.prod y completar APP_KEY
#   3. Apuntar sportplanner.app → IP del servidor
#
# Uso:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# ──────────────────────────────────────────────────────────

name: sportplaner-prod

networks:
  traefik-public:
    external: true      # creada manualmente: docker network create traefik-public
  internal:
    driver: bridge      # red privada frontend ↔ api

volumes:
  letsencrypt:          # certificados Let's Encrypt (persistentes)
  sqlite-data:          # base de datos SQLite
  api-storage:          # logs, cache, sesiones de Laravel

services:

  # ── Traefik (reverse proxy + SSL) ──────────────────────
  traefik:
    image: traefik:v3.1
    container_name: sp-traefik
    restart: unless-stopped
    command:
      - "--configFile=/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"    # El propio Traefik no se auto-expone

  # ── Laravel API ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: sportplaner/api:latest
    container_name: sp-api
    restart: unless-stopped
    environment:
      APP_NAME: SportPlaner
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: https://sportplanner.app
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
      # Trusted proxies (Traefik → Nginx → PHP-FPM)
      TRUSTED_PROXIES: "*"
    volumes:
      - sqlite-data:/var/www/html/database
      - api-storage:/var/www/html/storage
    networks:
      - internal              # solo accesible desde frontend, no desde internet
    labels:
      - "traefik.enable=false"

  # ── Vue Frontend (Nginx) ───────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    image: sportplaner/frontend:latest
    container_name: sp-frontend
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"

      # ── Router principal: HTTPS ──────────────────────
      - "traefik.http.routers.sportplaner.rule=Host(`sportplanner.app`) || Host(`www.sportplanner.app`)"
      - "traefik.http.routers.sportplaner.entrypoints=websecure"
      - "traefik.http.routers.sportplaner.tls=true"
      - "traefik.http.routers.sportplaner.tls.certresolver=letsencrypt"
      - "traefik.http.services.sportplaner.loadbalancer.server.port=80"

      # ── Redirect www → non-www ────────────────────────
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.sportplanner\\.app(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://sportplanner.app$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.sportplaner.middlewares=www-redirect"

      # ── Security headers middleware ───────────────────
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
