# ── SportPlanner — Server (IP, no domain) ────────────────
# Uso: docker compose -f docker-compose.server.yml up -d --build
# Acceso: http://<IP>

name: sportplanner

networks:
  internal:
    driver: bridge

volumes:
  sqlite-data:
  api-storage:

services:

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: sp-api
    restart: unless-stopped
    environment:
      APP_NAME: SportPlanner
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: http://137.184.225.11:8082
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
      TRUSTED_PROXIES: "*"
    volumes:
      - sqlite-data:/var/www/html/database
      - api-storage:/var/www/html/storage
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: sp-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - api
    networks:
      - internal
